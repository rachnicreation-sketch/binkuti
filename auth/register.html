<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | BINKUTI</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 3rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <main class="section">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Inscription</h1>
                <p>Rejoignez le cercle BINKUTI.</p>
            </div>
            
            <form id="standalone-register-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="name" placeholder="Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <div style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: flex-start; font-size: 0.8rem; opacity: 0.7;">
                    <input type="checkbox" required style="width: auto; margin-top: 3px;">
                    <label>J'accepte les <a href="../legal/terms.html" style="text-decoration: underline;">Conditions Générales</a> et la <a href="../legal/privacy.html" style="text-decoration: underline;">Politique de Confidentialité</a>.</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Créer mon compte</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                Déjà un compte ? <a href="login.html" style="color: var(--primary); font-weight: 700;">Se connecter</a>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('standalone-register-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('reg-email').value;
            localStorage.setItem('binkuti_user', JSON.stringify({name, email}));
            alert("Compte créé avec succès !");
            window.location.href = '../account/profile.html';
        };
    </script>
</body>
</html>
