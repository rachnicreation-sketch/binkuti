<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | BINKUTI</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 3rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <main class="section">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Connexion</h1>
                <p>Heureux de vous revoir !</p>
            </div>
            
            <form id="standalone-login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div style="text-align: right; margin-bottom: 1.5rem;">
                    <a href="#" style="font-size: 0.85rem; opacity: 0.6;">Mot de passe oublié ?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Se connecter</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
                Pas encore de compte ? <a href="register.html" style="color: var(--primary); font-weight: 700;">Créer un compte</a>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('standalone-login-form').onsubmit = (e) => {
            e.preventDefault();
            const user = { name: "Utilisateur", email: document.getElementById('email').value };
            localStorage.setItem('binkuti_user', JSON.stringify(user));
            alert("Connexion réussie !");
            window.location.href = '../account/profile.html';
        };
    </script>
</body>
</html>
