<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | BINKUTI Fashion</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 3rem;
        }
        .profile-sidebar {
            background: #f9f9f9;
            padding: 2rem;
            border-radius: 8px;
            height: fit-content;
        }
        .sidebar-menu { list-style: none; padding: 0; margin-top: 2rem; }
        .sidebar-menu li { margin-bottom: 1rem; cursor: pointer; padding: 0.5rem; border-radius: 4px; transition: 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: #000; color: #fff; }
        
        .profile-main { background: #fff; }
        .order-card {
            border: 1px solid #eee;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-shipped { background: #e3f2fd; color: #1976d2; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        
        @media (max-width: 768px) {
            .profile-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <div class="profile-container">
        <aside class="profile-sidebar">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 80px; height: 80px; background: #ddd; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h3 id="user-display-name">Chargement...</h3>
                <p id="user-display-email" style="font-size: 0.8rem; opacity: 0.6;"></p>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><i class="fa-solid fa-box-open" style="margin-right: 10px;"></i> Mes Commandes</li>
                <li><i class="fa-regular fa-heart" style="margin-right: 10px;"></i> Ma Liste de Souhaits</li>
                <li><i class="fa-solid fa-location-dot" style="margin-right: 10px;"></i> Adresses</li>
                <li onclick="logout()"><i class="fa-solid fa-right-from-bracket" style="margin-right: 10px;"></i> Déconnexion</li>
            </ul>
        </aside>

        <main class="profile-main">
            <h2 style="margin-bottom: 2rem; text-transform: uppercase;">Mes Commandes Récentes</h2>
            
            <div id="orders-list">
                <div style="text-align: center; padding: 4rem; background: #f9f9f9; border-radius: 8px; border: 1px dashed #ddd;">
                    <i class="fa-solid fa-box-open" style="font-size: 3rem; opacity: 0.2; margin-bottom: 1rem;"></i>
                    <p style="opacity: 0.6;">Vous n'avez pas encore passé de commande.</p>
                    <a href="../shop.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Commencer mes achats</a>
                </div>
            </div>

            <div style="margin-top: 4rem;">
                <h2 style="margin-bottom: 2rem; text-transform: uppercase;">Paramètres du compte</h2>
                <form id="profile-edit-form" style="display: grid; gap: 1rem; max-width: 500px;">
                    <div class="form-group">
                        <label>Nom Complet</label>
                        <input type="text" id="edit-name" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="edit-email" readonly style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; background: #f5f5f5; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Numéro de Téléphone</label>
                        <input type="tel" placeholder="Non renseigné" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: fit-content; padding: 0.8rem 2rem;">Enregistrer les modifications</button>
                </form>
            </div>
        </main>
    </div>

    <footer id="main-footer"></footer>

    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('binkuti_user'));
            if (!user) {
                alert("Veuillez vous connecter pour accéder à votre profil.");
                window.location.href = '../index.html';
                return;
            }

            document.getElementById('user-display-name').innerText = user.name;
            document.getElementById('user-display-email').innerText = user.email;
            
            // Fill form
            document.getElementById('edit-name').value = user.name;
            document.getElementById('edit-email').value = user.email;
        });

        function logout() {
            localStorage.removeItem('binkuti_user');
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
