<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée | BINKUTI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-container {
            text-align: center;
            padding: 8rem 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #eee;
            margin-bottom: 0;
            line-height: 1;
        }
        .error-text {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <header id="main-header"></header>

    <main class="section">
        <div class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-text">Oups ! Cette page s'est envolée.</h1>
            <p style="margin-bottom: 3rem; opacity: 0.7;">Désolé, la page que vous recherchez n'existe pas ou a été déplacée.</p>
            
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
                <a href="shop.html" class="btn" style="background: #eee; color: #000;">Aller à la boutique</a>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
