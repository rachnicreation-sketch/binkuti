<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | BINKUTI - Mode Africaine Styliste</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header id="main-header"></header>

    <main class="section">
        <div class="shop-container">
            <!-- Sidebar -->
            <aside class="filters-sidebar">
                <h3>Filtres</h3>
                <div class="filter-group">
                    <h4>Catégories</h4>
                    <ul class="filter-options">
                        <li><input type="checkbox" class="filter-check" value="Femme" id="cat-femme"> <label for="cat-femme">Femme</label></li>
                        <li><input type="checkbox" class="filter-check" value="Homme" id="cat-homme"> <label for="cat-homme">Homme</label></li>
                        <li><input type="checkbox" class="filter-check" value="Enfant" id="cat-enfant"> <label for="cat-enfant">Enfant</label></li>
                    </ul>
                </div>

                <div class="filter-group">
                    <h4>Tissus</h4>
                    <ul class="filter-options">
                        <li><input type="checkbox" class="filter-check" value="Lin" id="fabric-lin"> <label for="fabric-lin">Lin</label></li>
                        <li><input type="checkbox" class="filter-check" value="Satin" id="fabric-satin"> <label for="fabric-satin">Satin</label></li>
                        <li><input type="checkbox" class="filter-check" value="Luxe" id="fabric-luxe"> <label for="fabric-luxe">Luxe</label></li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="shop-content">
                <div class="shop-header">
                    <h2>Tous nos articles</h2>
                    <div class="sort-options">
                        Trier par: 
                        <select style="padding: 0.5rem; border: none; background: transparent; font-weight: 600;">
                            <option>Nouveautés</option>
                            <option>Prix croissant</option>
                            <option>Prix décroissant</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid" id="shop-product-grid">
                    <!-- Products will be generated by JS -->
                </div>
            </div>
        </div>
    </main>


    <footer id="main-footer"></footer>

    <script src="assets/js/main.js"></script>
    <script>
        // Local logic for shop page
        document.addEventListener('DOMContentLoaded', () => {
            renderShopProducts();

            // Listen for checkbox changes
            document.querySelectorAll('.filter-check').forEach(check => {
                check.addEventListener('change', () => renderShopProducts());
            });
        });

        function renderShopProducts() {
            const grid = document.getElementById('shop-product-grid');
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search')?.toLowerCase();
            const catQuery = urlParams.get('cat')?.toLowerCase();

            // Get selected filters
            const selectedFilters = Array.from(document.querySelectorAll('.filter-check:checked')).map(c => c.value);

            let products = [...PRODUCTS_DB];

            // Apply URL Filters
            if (searchQuery) {
                products = products.filter(p => p.name.toLowerCase().includes(searchQuery) || p.cat.toLowerCase().includes(searchQuery));
            } else if (catQuery) {
                products = products.filter(p => p.cat.toLowerCase() === catQuery);
            }

            // Apply Sidebar Filters
            if (selectedFilters.length > 0) {
                products = products.filter(p => selectedFilters.includes(p.cat) || selectedFilters.some(f => p.name.includes(f)));
            }

            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 4rem; opacity: 0.5;">Aucun produit ne correspond à votre recherche.</p>';
                return;
            }

            grid.innerHTML = products.map(p => generateProductHTML(p)).join('');
        }
    </script>
</body>
</html>
