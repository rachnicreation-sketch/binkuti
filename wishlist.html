<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste d'Envies | BINKUTI</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo">BIN<span>KUTI</span></a>
            <div class="nav-actions">
                <div class="cart-icon">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="section">
        <div class="section-title">
            <h2>Ma Liste d'Envies</h2>
            <p>Retrouvez ici tous les articles qui vous ont fait craquer.</p>
        </div>

        <div id="wishlist-content" class="product-grid">
            <!-- Simulated Wishlist Items -->
            <div class="product-card">
                <div class="product-img">
                    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=800" alt="Item">
                    <div class="wishlist-btn" style="color: #ff4d4d;"><i class="fa-solid fa-heart"></i></div>
                </div>
                <div class="product-info">
                    <h3 class="product-name">Robe d'Été Fleurie</h3>
                    <div class="product-price">45.000 FCFA</div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ajouter au panier</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-img">
                    <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?auto=format&fit=crop&q=80&w=800" alt="Item">
                    <div class="wishlist-btn" style="color: #ff4d4d;"><i class="fa-solid fa-heart"></i></div>
                </div>
                <div class="product-info">
                    <h3 class="product-name">Chemise Casual Lin</h3>
                    <div class="product-price">28.000 FCFA</div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Ajouter au panier</button>
                </div>
            </div>
        </div>
    </main>

    <footer style="text-align: center; padding: 2rem; opacity: 0.5;">
        &copy; 2026 BINKUTI.
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
